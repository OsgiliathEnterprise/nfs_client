---
- name: Prepare IDM server
  hosts:
    - idm.osgiliath.test
  tasks:
    - name: "install fedora ansible prerequisites"
      ansible.builtin.raw: dnf install -y python3 python3-libdnf5
      changed_when: false
      become: true
    - include_role:
        name: tcharl.freeipa_server
      vars:
        preferred_nic: "eth1"
        standalone_role: True
        firewalld_zone: "internal"
        company_domain: "osgiliath.test" # That server's hostname will be should ipa."{{ company_domain }}"
        company_realm_password: '123ADMin'
        company_ad_password: '123ADmPass'
    - include_role:
        name: tcharl.ansible_nameserver
      vars:
        standalone_role: False
        secure_logs: False
        preferred_nic: "eth1"
        company_domain: osgiliath.test
        idm_preferred_nic: "eth1"
        company_realm_password: '123ADMin'
        company_ad_password: '123ADmPass'
- name: Expose prepare IPA clients
  hosts:
   - datastore.osgiliath.test
   - consumer.osgiliath.test
  tasks:
    - name: "install fedora ansible prerequisites"
      ansible.builtin.raw: dnf install -y python3 python3-libdnf5
      changed_when: false
      become: true
    - include_role:
        name: tcharl.ansible_securehost
      vars:
        standalone_role: False
        secure_logs: False
        preferred_nic: "eth1"
        company_domain: osgiliath.test
        idm_preferred_nic: "eth1"
        company_realm_password: '123ADMin'
        company_ad_password: '123ADmPass'
    - include_role:
        name: tcharl.ansible_nameserver
      vars:
        standalone_role: False
        secure_logs: False
        preferred_nic: "eth1"
        company_domain: osgiliath.test
        idm_preferred_nic: "eth1"
        company_realm_password: '123ADMin'
        company_ad_password: '123ADmPass'
- name: Expose NFS
  hosts: datastore.osgiliath.test
  tasks:
    - include_role:
        name: tcharl.nfs_server
      vars:
        secure_logs: False
        preferred_nic: "eth1"
        idm_preferred_nic: "eth1"
        company_domain: osgiliath.test
        company_realm_password: '123ADMin'
        company_ad_password: '123ADmPass'
        lvm_groups:
          - vgname: non-persistent
            disks:
              - /dev/sdb1
            create: true
            lvmetanames:
              - lvname: nfs_exposed
                size: 4M
                create: true
                filesystem: xfs
                expose_nfs: True
                mntp: /var/nfs
                mount: true
        manage_lvm: true
        configure_nfs: True
